name: B站动态监控 - 鳄鱼派

on:
  schedule:
    # 周一到周五
    # 9:30-15:00 每30分钟 (UTC 1:30-7:00)
    - cron: '0,30 1-6 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          UP_LIST: ${{ secrets.UP_LIST }}
          SEND_KEYS: ${{ secrets.SEND_KEYS }}
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
        run: python monitor.py