name: B站动态监控 - 股市里的猩猩

on:
  schedule:
    # 周一到周五
    # 9:25-9:45 每分钟 (UTC 1:25-1:45)
    - cron: '25-45 1 * * 1-5'
    # 9:45-10:00 每2分钟 (UTC 1:45-2:00)
    - cron: '45,47,49,51,53,55,57,59 1 * * 1-5'
    # 10:00-15:00 每30分钟 (UTC 2:00-7:00)
    - cron: '0,30 2-6 * * 1-5'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - env:
          UP_LIST: ${{ secrets.UP_LIST }}
          SEND_KEYS: ${{ secrets.SEND_KEYS }}
          BILI_COOKIE: ${{ secrets.BILI_COOKIE }}
          MONITOR_NAMES: 股市里的猩猩
        run: python monitor.py
