name: B站动态监控

on:
  # 定时触发：每30分钟运行一次
  schedule:
    - cron: '*/30 * * * *'
  
  # 允许手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 设置Python环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      # 运行监控脚本
      - name: Run monitor script
        env:
          # 从GitHub Secrets读取配置
          UP_LIST: ${{ secrets.UP_LIST }}
          SEND_KEYS: ${{ secrets.SEND_KEYS }}
        run: |
          # 运行监控脚本
          python monitor.py
      
      # 提交历史记录变更（如果有）
      - name: Commit history changes
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add history.json || true
          git diff --staged --quiet || git commit -m "Update history $(date +'%Y-%m-%d %H:%M:%S')"
          git push || true
